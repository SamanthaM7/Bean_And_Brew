<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Bean&Brew</title>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
    </head>

    <body>

        <header>
            <div class = "logo">
                <img src = "images\bean&brewfox.png" alt = "Bean & Brew's logo, a drawing of a fox.">
                <h1>Bean & Brew</h1>
                <a href="socialmedia.html" target="_blank">Check out our social media</a>
            </div>

            <nav>
                <div class="navbar">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="events.html">Events</a>
                <a href="visit.html">Visit</a>
                </div>
            </nav>
        </header>

        <div class = "bookingform">
        <h2>Book Us For An Event</h2>
        
        <p>Put in a request to book us as a venue.</p><br>

        <form>
            <label for="eventType">Event Type: </label><br>
            <select name="type" id="type">
                <option value="Birthday Party Child">Birthday Party (Child)</option>
                <option value="Birthday Party Child">Birthday Party (Adult)</option>
                <option value="Birthday Party Child">Birthday Party (Dog)</option>
                <option value="Party">Party</option>
                <option value="Meeting">Meeting</option>
                <option value="Work Lunch">Work Lunch</option>
                <option value="Afternoon Tea">Afternoon Tea</option>
            </select> <br><br>

            <label for="attendees">Number of attendees:</label><br>
            <input type="number" id="attendees" name="attendees" required><br><br>

            <label for="time">Date and Time:</label><br>
            <input type="datetime-local" id="eventtime" name="eventtime" required><br><br>

            <label for="name">Name: </label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email: </label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="additional">Any additional requests or questions? </label><br>
            <input type="text" id="additional" name="additional"><br><br>

            <button class = "bookbutton" >Book</button>

        </form>
    </div>

    </body>
</html>
